<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <!-- https://developer.mozilla.org/en-US/docs/Web/HTTP/CSP -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'" />
    <meta http-equiv="X-Content-Security-Policy" content="default-src 'self'; script-src 'self'" />
    <link rel="stylesheet" href="style.css">
    <title>Guitar Tab | Tool 🎸</title>
</head>

<body>
    <div id="root">
        <div id="controls-container">
            <div id="bpm">
                <label for="bpm">BPM</label>
                <input type="number" id="bpmIN" value="160" min="1" max="300" step="1">
            </div>
            <div id="measures">
                <label for="measures">Measures</label>
                <input type="number" id="measuresIN" value="4" min="1" max="64" step="1">
            </div>
            <div id="beats">
                <label for="beats">Beats</label>
                <input type="number" id="beatsIN" value="3" min="1" max="64" step="1">
            </div>
            <div>
                <button class="secondary" id="resetBTN">Reset</button>
                <button class="primary" id="playBTN">►</button>
            </div>
        </div>
    </div>
    <script src="song.js"></script>
    <script src="renderer.js"></script>
</body>

</html>
